# kubectl create secret generic vpc-stream-secret \
#   --from-literal=internal-token=YOUR_TOKEN
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  labels:
    app: vpc-stream
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vpc-stream
      tier: frontend
  template:
    metadata:
      labels:
        app: vpc-stream
        tier: frontend
    spec:
      containers:
        - name: dashboard
          image: vpc-stream/dashboard:1.0.0
          ports:
            - containerPort: 5003
          env:
            - name: DASHBOARD_PORT
              value: "5003"
            - name: ANOMALY_DETECTOR_WS_URL
              value: "http://anomaly-detector:5002"
            - name: LOG_GENERATOR_URL
              value: "http://log-generator:5001"
            - name: INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vpc-stream-secret
                  key: internal-token
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  labels:
    app: vpc-stream
    tier: frontend
spec:
  type: NodePort
  ports:
    - port: 5003
      targetPort: 5003
      nodePort: 30003
  selector:
    app: vpc-stream
    tier: frontend
