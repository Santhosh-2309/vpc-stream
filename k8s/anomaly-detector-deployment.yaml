# kubectl create secret generic vpc-stream-secret \
#   --from-literal=internal-token=YOUR_TOKEN
#
# kubectl create secret generic influxdb-secret \
#   --from-literal=admin-password=YOUR_PASSWORD \
#   --from-literal=admin-token=YOUR_TOKEN
apiVersion: apps/v1
kind: Deployment
metadata:
  name: anomaly-detector
  labels:
    app: vpc-stream
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vpc-stream
      tier: backend
  template:
    metadata:
      labels:
        app: vpc-stream
        tier: backend
    spec:
      containers:
        - name: anomaly-detector
          image: vpc-stream/anomaly-detector:1.0.0
          ports:
            - containerPort: 5002
          env:
            - name: ANOMALY_DETECTOR_PORT
              value: "5002"
            - name: INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vpc-stream-secret
                  key: internal-token
            - name: DDOS_THRESHOLD
              value: "500"
            - name: BLOCKED_IPS
              value: "192.168.1.100,10.0.0.5"
            - name: INFLUXDB_URL
              value: "http://influxdb:8086"
            - name: INFLUXDB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: influxdb-secret
                  key: admin-token
            - name: INFLUXDB_ORG
              value: "vpc_stream_org"
            - name: INFLUXDB_BUCKET
              value: "vpc_stream"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: anomaly-detector
  labels:
    app: vpc-stream
    tier: backend
spec:
  type: ClusterIP
  ports:
    - port: 5002
      targetPort: 5002
  selector:
    app: vpc-stream
    tier: backend
